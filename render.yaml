services:
  # Spring Boot Backend
  - type: web
    name: taskflow-backend
    runtime: java
    plan: free
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -Dspring.profiles.active=prod -jar target/taskmanager-backend-1.0.0.jar
    healthCheckPath: /api/auth/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://taskflow-app.netlify.app

databases:
  - name: taskflow-db
    plan: free
    databaseName: taskmanager_db
    user: taskmanager
