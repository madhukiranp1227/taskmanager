# Production profile — Render.com deployment

spring.application.name=taskmanager-backend

# Database — Render PostgreSQL
# Render gives: postgresql://user:pass@host/db
# JDBC needs: jdbc:postgresql://user:pass@host/db
# We use a workaround via spring.datasource.url with a placeholder
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
jwt.secret=${JWT_SECRET:fallback_secret_change_this}
jwt.expiration=86400000

# Server
server.port=${PORT:8080}
