# Production profile — Render.com deployment
# Set SPRING_PROFILES_ACTIVE=prod in Render dashboard

spring.application.name=taskmanager-backend

# Database — Render PostgreSQL (free tier)
# Render sets DATABASE_URL automatically when you link a PostgreSQL database
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT — generate a strong random secret in Render dashboard
jwt.secret=${JWT_SECRET:fallback_secret_change_this}
jwt.expiration=86400000

# Server port — Render injects $PORT
server.port=${PORT:8080}
