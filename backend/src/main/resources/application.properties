spring.application.name=taskmanager-backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/taskmanager_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=taskmanager_super_secret_key_that_is_long_enough_for_hs256_algorithm
jwt.expiration=86400000

# Server
server.port=8080

# CORS
spring.web.cors.allowed-origins=http://localhost:5173
